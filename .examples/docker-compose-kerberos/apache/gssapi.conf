<VirtualHost *:80>
    ServerName apache.example.com

    DocumentRoot /var/www/html

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    <Directory /var/www/html>
        Require all granted
    </Directory>

    Alias /secure /var/www/html/secure

    <Directory /var/www/html/secure>
        AuthType GSSAPI
        AuthName "Kerberos protected endpoint"
        GssapiCredStore keytab:/etc/apache2/apache-http.keytab
        GssapiLocalName On
        Require valid-user
    </Directory>
</VirtualHost>